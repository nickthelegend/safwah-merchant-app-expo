name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Jest (payment · nfc · printer · settlement · toast)
        run: npm test
